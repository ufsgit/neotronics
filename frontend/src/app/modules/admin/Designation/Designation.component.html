<div *ngIf="issLoading" class="overlay">
    <mat-progress-spinner class="spinner" [color]="color" [mode]="mode" [value]="value">
    </mat-progress-spinner>
</div>

<div class="main-content">
    <div class="container-fluid px-0">

        <!-- LIST VIEW -->
        <div *ngIf="!Entry_View">
            <!-- PAGE HEADER -->
            <div class="lead-list-header d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h4 class="page-title-main">Designation</h4>
                </div>
                <div class="d-flex align-items-center" style="gap: 10px;">
                    <button mat-raised-button (click)="Create_New()" class="btn-new-lead">
                        <i class="material-icons" style="font-size:18px;">add</i>
                        Create New
                    </button>
                </div>
            </div>

            <!-- FILTER PANEL -->
            <div class="lead-filter-panel mb-3">
                <div class="filter-grid">
                    <mat-form-field appearance="legacy" floatLabel="never">
                        <input matInput placeholder="Search Designation Name" [(ngModel)]="Search_Designation_" name="Search_Designation_">
                    </mat-form-field>

                    <button mat-raised-button class="btn-new-lead" (click)="Search_Designation()" style="min-width: 100px;">
                        SEARCH
                    </button>
                </div>
            </div>

            <!-- TABLE -->
            <div class="lead-table-container">
                <div class="table-scroll-area" [style.height.px]="myInnerHeight">
                    <table class="lead-data-table">
                        <thead>
                            <tr>
                                <th style="width: 80px;">Sl No</th>
                                <th>Designation</th>
                                <th>Description</th>
                                <th style="text-align:right;">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let Designation_1 of Designation_Data; let i = index">
                                <td>{{ i + 1 }}</td>
                                <td style="font-weight:600;">{{ Designation_1["Designation_Name"] }}</td>
                                <td>{{ Designation_1["Description"] }}</td>
                                <td>
                                    <div class="action-buttons justify-content-end">
                                        <div class="action-icon-btn btn-edit-tb" [hidden]="Designation_Edit==false" (click)="Edit_Designation(Designation_1)" title="Edit">
                                            <i class="material-icons">edit</i>
                                        </div>
                                        <div class="action-icon-btn btn-delete-tb" [hidden]="Designation_Delete==false" (click)="Delete_Designation(Designation_1.Designation_Id, i)" title="Delete">
                                            <i class="material-icons">close</i>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            <tr *ngIf="Designation_Data?.length === 0">
                                <td colspan="4" class="text-center py-5 text-muted">No records found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="entry-num">Total Entries: {{ Total_Entries }}</div>
            </div>
        </div>

        <!-- ENTRY VIEW (ADD / EDIT) -->
        <div *ngIf="Entry_View">
            <div class="lead-entry-header d-flex justify-content-between align-items-center">
                <h4 class="page-title-main">{{ Designation_.Designation_Id > 0 ? 'Edit Designation' : 'Add New Designation' }}</h4>
                <button class="btn-close-custom" (click)="Close_Click()">
                    <i class="material-icons">close</i> Close
                </button>
            </div>

            <form>
                <div class="lead-entry-body">
                    <div class="user-entry-sections">
                        <div class="basic-info-section">
                            <div class="basic-info-grid">
                                <!-- Designation Name -->
                                <div class="trackbox-input-group">
                                    <label class="input-label">Designation Name <span class="required-star">*</span></label>
                                    <mat-form-field appearance="legacy" floatLabel="never">
                                        <input matInput type="text" [(ngModel)]="Designation_.Designation_Name" name="Designation_Name">
                                    </mat-form-field>
                                </div>
                                <!-- Description -->
                                <div class="trackbox-input-group">
                                    <label class="input-label">Description</label>
                                    <mat-form-field appearance="legacy" floatLabel="never">
                                        <textarea matInput rows="5" [(ngModel)]="Designation_.Description" name="Description"></textarea>
                                    </mat-form-field>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- FORM ACTIONS -->
                    <div class="d-flex justify-content-end mt-4" style="gap: 12px;">
                        <button mat-raised-button class="btn-cancel" (click)="Close_Click()">Cancel</button>
                        <button mat-raised-button class="btn-save" [hidden]="Designation_Save==false" (click)="Save_Designation()">Save</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

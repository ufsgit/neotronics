<!-- Loading Overlay -->
<div *ngIf="issLoading" class="ig-overlay">
  <mat-progress-spinner [color]="color" [mode]="mode" [value]="value" diameter="36"></mat-progress-spinner>
</div>

<div class="ig-page">

  <!-- ── HEADER ── -->
  <div class="ig-header">
    <div>
      <h1 class="ig-title">Terms &amp; Conditions</h1>
      <p class="ig-subtitle">Manage terms and condition entries</p>
    </div>
    <button mat-button class="ig-btn-add" type="button" (click)="Create_New()" *ngIf="!Entry_View">
      <i class="material-icons">add</i> Add Terms
    </button>
  </div>

  <!-- ── ENTRY FORM ── -->
  <div class="ig-form-card" *ngIf="Entry_View">
    <p class="ig-form-label">{{ Term_.TC_Id > 0 ? 'Edit Term' : 'New Term' }}</p>
    <form>
      <div class="ig-form-row">

        <!-- Caption -->
        <div class="ig-field">
          <label class="ig-label">Caption <span class="ig-req">*</span></label>
          <input
            type="text"
            class="ig-input"
            [(ngModel)]="Term_.Caption"
            name="Caption_Entry"
            placeholder="Enter caption"
            autocomplete="off"
          />
        </div>

        <!-- Description -->
        <div class="ig-field ig-field-wide">
          <label class="ig-label">Description</label>
          <textarea
            class="ig-textarea"
            [(ngModel)]="Term_.Description"
            name="Description_Entry"
            placeholder="Enter description"
            rows="3"
          ></textarea>
        </div>

        <!-- Action Buttons -->
        <div class="ig-form-actions">
          <button class="ig-btn-cancel" type="button" (click)="Close_Click()">Cancel</button>
          <button
            class="ig-btn-save"
            type="button"
            id="Save_Button"
            [hidden]="Term_Save == false"
            (click)="Save_Term()"
          >Save</button>
        </div>

      </div>
    </form>
  </div>

  <!-- ── SEARCH ── -->
  <div class="ig-search-bar" *ngIf="!Entry_View">
    <div class="ig-search-wrap">
      <i class="material-icons">search</i>
      <input
        type="text"
        class="ig-search-input"
        [(ngModel)]="Search_Caption"
        name="Search_Caption"
        placeholder="Search terms &amp; conditions…"
        (keyup.enter)="Search_Term()"
      />
    </div>
    <span class="ig-count">{{ Total_Entries }} {{ Total_Entries === 1 ? 'record' : 'records' }}</span>
  </div>

  <!-- ── TABLE ── -->
  <div class="ig-table-card" *ngIf="!Entry_View">
    <div class="ig-table-wrap" [style.height.px]="myInnerHeight">
      <table class="ig-table">
        <thead>
          <tr>
            <th class="ig-th ig-th-no">#</th>
            <th class="ig-th">Caption</th>
            <th class="ig-th">Description</th>
            <th class="ig-th ig-th-actions">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let term of Terms_Data; let i = index" class="ig-tr">
            <td class="ig-td ig-td-no">{{ i + 1 }}</td>
            <td class="ig-td ig-td-name">{{ term.Caption }}</td>
            <td class="ig-td">{{ term.Description }}</td>
            <td class="ig-td ig-td-actions">
              <button
                class="ig-icon-btn ig-edit"
                [hidden]="Term_Edit == false"
                (click)="Edit_Term(term, i)"
                title="Edit"
              ><i class="material-icons">edit</i></button>
            </td>
          </tr>
          <tr *ngIf="Terms_Data?.length === 0">
            <td colspan="4" class="ig-empty">No records found</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

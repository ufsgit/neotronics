<div *ngIf="issLoading" class="overlay">
    <mat-progress-spinner class="spinner" [color]="color" [mode]="mode" [value]="value">
    </mat-progress-spinner>
</div>

<div class="main-trackbox-content">
    <div class="trackbox-container">

        <!-- FORM ENTRY VIEW -->
        <div class="row" *ngIf="Entry_View">
            <div class="col-md-12">
                <div class="trackbox-table-card p-4">
                    <form>
                        <div class="row">
                            <div class="col-md-5">
                                <label class="input-label mb-2 d-block">
                                    Brand Name <span class="required-star">*</span>
                                </label>
                                <div class="modern-form-field">
                                    <input matInput type="text" [(ngModel)]="Brand_.Brand_Name" name="Brand_Name_Entry" placeholder="Enter Brand Name">
                                </div>
                            </div>

                            <div class="col-md-5">
                                <label class="input-label mb-2 d-block">
                                    Item Name <span class="required-star">*</span>
                                </label>
                                <div class="modern-form-field">
                                    <input matInput type="text"
                                           [matAutocomplete]="autoItem"
                                           [(ngModel)]="Item_"
                                           name="Item_Entry"
                                           (input)="Search_Item_Typeahead($event)"
                                           (click)="Search_Item_Typeahead($event)"
                                           placeholder="Search Item Name">
                                    <mat-autocomplete #autoItem="matAutocomplete" [displayWith]="display_Item">
                                        <mat-option *ngIf="issLoading"><mat-spinner diameter="500"></mat-spinner></mat-option>
                                        <ng-container *ngIf="!issLoading">
                                            <mat-option *ngFor="let Item of Item_Data" [value]="Item">
                                                <span (click)="Item_Change(Item)">{{Item.Item_Name || Item.ItemName}}</span>
                                            </mat-option>
                                        </ng-container>
                                    </mat-autocomplete>
                                </div>
                            </div>

                            <div class="col-md-2 d-flex align-items-end justify-content-end gap-3">
                                <button mat-raised-button type="button" class="btn-add-new-trackbox btn-secondary-trackbox" (click)="Close_Click()">Close</button>
                                <button mat-raised-button type="button" [hidden]="Brand_Save==false" id="Save_Button" class="btn-add-new-trackbox" (click)="Save_Brand()">Save</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- LIST VIEW -->
        <div *ngIf="!Entry_View">
            <div class="trackbox-filter-area">
                <div class="modern-search-wrapper">
                    <i class="material-icons">search</i>
                    <input type="text"
                           class="modern-search-input"
                           [(ngModel)]="Search_Brand_"
                           name="Search_Brand_"
                           placeholder="Search Brand..."
                           (keyup.enter)="Search_Brand()">
                </div>

                <button mat-raised-button type="button" (click)="Create_New()" class="btn-add-new-trackbox">
                    <i class="material-icons">add</i>
                    Add Brand
                </button>
            </div>

            <div class="trackbox-table-card">
                <div class="table-responsive" [style.height.px]="myInnerHeight" style="overflow-y: scroll;">
                    <table class="modern-trackbox-table">
                        <thead>
                            <tr>
                                <th class="col-no">No.</th>
                                <th>Brand</th>
                                <th>Item Name</th>
                                <th class="col-actions">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let Brand_1 of Brand_Data; let i = index">
                                <td class="col-no">{{ i + 1 }}</td>
                                <td style="font-weight: 500;">{{Brand_1["Brand_Name"]}}</td>
                                <td>{{Brand_1["Item_Name"] || '-'}}</td>
                                <td class="col-actions">
                                    <div class="d-flex justify-content-center">
                                        <div class="action-icon-btn btn-edit-tb"
                                             [hidden]="Brand_Edit==false"
                                             (click)="Edit_Brand(Brand_1, i)"
                                             title="Edit">
                                            <i class="material-icons">edit</i>
                                        </div>
                                        <div class="action-icon-btn btn-delete-tb"
                                             [hidden]="Brand_Delete==false"
                                             (click)="Delete_Brand(Brand_1.Brand_Id, i)"
                                             title="Delete">
                                            <i class="material-icons">delete_outline</i>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            <tr *ngIf="Brand_Data?.length === 0">
                                <td colspan="4" class="text-center py-5 text-muted">No records found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="entries-summary">
                Entries : {{Total_Entries}}
            </div>
        </div>

    </div>
</div>

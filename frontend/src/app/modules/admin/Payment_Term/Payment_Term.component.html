<div *ngIf="issLoading" class="overlay">
    <mat-progress-spinner class="spinner" [color]="color" [mode]="mode" [value]="value">
    </mat-progress-spinner>
</div>

<div class="main-trackbox-content">
    <div class="trackbox-container">

        <!-- FORM ENTRY VIEW -->
        <div class="row" *ngIf="Entry_View">
            <div class="col-md-12">
                <div class="trackbox-table-card p-4">
                    <form>
                        <div class="row">
                            <div class="col-md-5">
                                <label class="input-label mb-2 d-block">
                                    Caption
                                </label>
                                <div class="modern-form-field">
                                    <input matInput type="text" [(ngModel)]="payment_term_.Caption" name="Caption_Entry" placeholder="Enter Caption">
                                </div>
                            </div>

                            <div class="col-md-5">
                                <label class="input-label mb-2 d-block">
                                    Description
                                </label>
                                <div class="modern-form-field textarea-field">
                                    <textarea matInput rows="3" [(ngModel)]="payment_term_.Description" name="Description_Entry" placeholder="Enter Description"></textarea>
                                </div>
                            </div>

                            <div class="col-md-2 d-flex align-items-end justify-content-end gap-3">
                                <button mat-raised-button type="button" class="btn-add-new-trackbox btn-secondary-trackbox" (click)="Close_Click()">Close</button>
                                <button mat-raised-button type="button" [hidden]="payment_term_Save==false" id="Save_Button" class="btn-add-new-trackbox" (click)="Save_payment_term()">Save</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- LIST VIEW -->
        <div *ngIf="!Entry_View">
            <div class="trackbox-filter-area">
                <div class="modern-search-wrapper">
                    <i class="material-icons">search</i>
                    <input type="text"
                           class="modern-search-input"
                           [(ngModel)]="search_payment_term_"
                           name="search_payment_term_"
                           placeholder="Search Payment Term..."
                           (keyup.enter)="Search_payment_term()">
                </div>

                <button mat-raised-button type="button" (click)="Create_New()" class="btn-add-new-trackbox">
                    <i class="material-icons">add</i>
                    Add Payment Term
                </button>
            </div>

            <div class="trackbox-table-card">
                <div class="table-responsive" [style.height.px]="myInnerHeight" style="overflow-y: scroll;">
                    <table class="modern-trackbox-table">
                        <thead>
                            <tr>
                                <th class="col-no">No.</th>
                                <th>Description</th>
                                <th>Caption</th>
                                <th class="col-actions">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let payment_term_1 of payment_term_Data; let i = index">
                                <td class="col-no">{{ i + 1 }}</td>
                                <td style="font-weight: 500;">{{ payment_term_1["Description"] }}</td>
                                <td>{{ payment_term_1["Caption"] }}</td>
                                <td class="col-actions">
                                    <div class="d-flex justify-content-center">
                                        <div class="action-icon-btn btn-edit-tb"
                                             [hidden]="payment_term_Edit==false"
                                             (click)="Edit_payment_term(payment_term_1, i)"
                                             title="Edit">
                                            <i class="material-icons">edit</i>
                                        </div>
                                        <div class="action-icon-btn btn-delete-tb"
                                             [hidden]="payment_term_Delete==false"
                                             (click)="Delete_payment_term(payment_term_1.payment_Term_ID, i)"
                                             title="Delete">
                                            <i class="material-icons">delete_outline</i>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            <tr *ngIf="payment_term_Data?.length === 0">
                                <td colspan="4" class="text-center py-5 text-muted">No records found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="entries-summary">
                Entries : {{Total_Entries}}
            </div>
        </div>

    </div>
</div>

<!-- Loading Overlay -->
<div *ngIf="issLoading" class="ig-overlay">
  <mat-progress-spinner [color]="color" [mode]="mode" [value]="value" diameter="36"></mat-progress-spinner>
</div>

<div class="ig-page">

  <!-- ── HEADER ── -->
  <div class="ig-header">
    <div>
      <h1 class="ig-title">HSN Codes</h1>
      <p class="ig-subtitle">Manage HSN / tax classification codes</p>
    </div>
    <button mat-button class="ig-btn-add" type="button" (click)="Create_New()" *ngIf="!Entry_View">
      <i class="material-icons">add</i> Add HSN
    </button>
  </div>

  <!-- ── ENTRY FORM ── -->
  <div class="ig-form-card" *ngIf="Entry_View">
    <p class="ig-form-label">{{ HSN_.HSN_Id > 0 ? 'Edit HSN Code' : 'New HSN Code' }}</p>
    <div class="ig-form-row">
      <div class="ig-field">
        <label class="ig-label">HSN Code <span class="ig-req">*</span></label>
        <input
          type="text"
          class="ig-input"
          [(ngModel)]="HSN_.HSN_CODE"
          name="HSN_CODE_Entry"
          placeholder="Enter HSN code"
          autocomplete="off"
        />
      </div>
      <div class="ig-form-actions">
        <button class="ig-btn-cancel" type="button" (click)="Close_Click()">Cancel</button>
        <button
          class="ig-btn-save"
          type="button"
          id="Save_Button"
          [hidden]="HSN_Save == false"
          (click)="Save_HSN()"
        >Save</button>
      </div>
    </div>
  </div>

  <!-- ── SEARCH ── -->
  <div class="ig-search-bar" *ngIf="!Entry_View">
    <div class="ig-search-wrap">
      <i class="material-icons">search</i>
      <input
        type="text"
        class="ig-search-input"
        [(ngModel)]="Search_Name"
        name="search_input"
        placeholder="Search HSN codes…"
        (keyup.enter)="Search_HSN()"
      />
    </div>
    <span class="ig-count">{{ Total_Entries }} {{ Total_Entries === 1 ? 'record' : 'records' }}</span>
  </div>

  <!-- ── TABLE ── -->
  <div class="ig-table-card" *ngIf="!Entry_View">
    <div class="ig-table-wrap" [style.max-height.px]="myInnerHeight">
      <table class="ig-table">
        <thead>
          <tr>
            <th class="ig-th ig-th-no">#</th>
            <th class="ig-th">HSN Code</th>
            <th class="ig-th ig-th-actions">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let hsn of HSN_Data; let i = index" class="ig-tr">
            <td class="ig-td ig-td-no">{{ i + 1 }}</td>
            <td class="ig-td ig-td-name">{{ hsn['HSN_CODE'] }}</td>
            <td class="ig-td ig-td-actions">
              <button
                class="ig-icon-btn ig-edit"
                [hidden]="HSN_Edit == false"
                (click)="Edit_HSN(hsn, i)"
                title="Edit"
              ><i class="material-icons">edit</i></button>
              <button
                class="ig-icon-btn ig-delete"
                [hidden]="HSN_Delete == false"
                (click)="Delete_HSN(hsn.HSN_Id, i)"
                title="Delete"
              ><i class="material-icons">delete_outline</i></button>
            </td>
          </tr>
          <tr *ngIf="HSN_Data?.length === 0">
            <td colspan="3" class="ig-empty">No records found</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

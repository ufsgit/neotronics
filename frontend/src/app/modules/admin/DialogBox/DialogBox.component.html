<div class="modern-dialog-container" [ngClass]="{'error-shake': showNo == '2', 'cool-success': showNo == 'false' || showNo == 'False'}">
  <div class="dialog-header" *ngIf="Heading">
    <h2>{{ Heading }}</h2>
  </div>
  
  <div class="dialog-content">
    <div class="icon-wrapper">
      <img [src]="Image_Url" alt="icon" class="dialog-icon" />
    </div>
    <div class="text-wrapper">
      <p class="dialog-message">{{ message }}</p>
    </div>
  </div>
  
  <div class="dialog-actions">
    <button *ngIf="show" class="btn-cancel" (click)="onNoClick()">{{ NoButton }}</button>
    <button class="btn-confirm" (click)="onYesClick()">{{ YesButton }}</button>
  </div>
</div>

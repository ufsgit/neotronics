<!-- Loading Overlay -->
<div *ngIf="issLoading" class="ig-overlay">
  <mat-progress-spinner [color]="color" [mode]="mode" [value]="value" diameter="36"></mat-progress-spinner>
</div>

<div class="ig-page">

  <!-- ── HEADER ── -->
  <div class="ig-header">
    <div>
      <h1 class="ig-title">User Roles</h1>
      <p class="ig-subtitle">Manage user roles for access control</p>
    </div>
    <button mat-button class="ig-btn-add" type="button" (click)="Create_New()" *ngIf="!Entry_View">
      <i class="material-icons">add</i> Add Role
    </button>
  </div>

  <!-- ── ENTRY FORM ── -->
  <div class="ig-form-card" *ngIf="Entry_View">
    <p class="ig-form-label">{{ User_Role_.User_Role_Id > 0 ? 'Edit User Role' : 'New User Role' }}</p>
    <div class="ig-form-row">
      <div class="ig-field">
        <label class="ig-label">User Role Name <span class="ig-req">*</span></label>
        <input
          type="text"
          class="ig-input"
          [(ngModel)]="User_Role_.User_Role_Name"
          name="User_Role_Name"
          placeholder="Enter role name"
          autocomplete="off"
        />
      </div>
      <div class="ig-form-actions">
        <button class="ig-btn-cancel" type="button" (click)="Close_Click()">Cancel</button>
        <button
          class="ig-btn-save"
          type="button"
          [hidden]="User_Role_Save == false"
          (click)="Save_User_Role()"
        >Save</button>
      </div>
    </div>
  </div>

  <!-- ── SEARCH ── -->
  <div class="ig-search-bar" *ngIf="!Entry_View">
    <div class="ig-search-wrap">
      <i class="material-icons">search</i>
      <input
        type="text"
        class="ig-search-input"
        [(ngModel)]="Search_User_Role_Name"
        name="Search_User_Role_Name"
        placeholder="Search user roles…"
        (keyup.enter)="Search_User_Role()"
      />
    </div>
    <span class="ig-count">{{ Total_Entries }} {{ Total_Entries === 1 ? 'record' : 'records' }}</span>
  </div>

  <!-- ── TABLE ── -->
  <div class="ig-table-card" *ngIf="!Entry_View">
    <div class="ig-table-wrap" [style.max-height.px]="myInnerHeight">
      <table class="ig-table">
        <thead>
          <tr>
            <th class="ig-th ig-th-no">#</th>
            <th class="ig-th">User Role Name</th>
            <th class="ig-th ig-th-actions">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let role of User_Role_Data; let i = index" class="ig-tr">
            <td class="ig-td ig-td-no">{{ i + 1 }}</td>
            <td class="ig-td ig-td-name">{{ role.User_Role_Name }}</td>
            <td class="ig-td ig-td-actions">
              <button class="ig-icon-btn ig-edit" [hidden]="User_Role_Edit == false"
                (click)="Edit_User_Role(role)" title="Edit">
                <i class="material-icons">edit</i>
              </button>
              <button class="ig-icon-btn ig-delete" [hidden]="User_Role_Delete == false"
                (click)="Delete_User_Role(role.User_Role_Id, i)" title="Delete">
                <i class="material-icons">delete_outline</i>
              </button>
            </td>
          </tr>
          <tr *ngIf="User_Role_Data?.length === 0">
            <td colspan="3" class="ig-empty">No user roles found</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

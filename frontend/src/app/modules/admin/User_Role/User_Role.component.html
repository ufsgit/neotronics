<div *ngIf="issLoading" class="overlay">
    <mat-progress-spinner class="spinner" [color]="color" [mode]="mode" [value]="value">
    </mat-progress-spinner>
</div>
<div class="main-content mt-0" style="padding: 0px 0px !important;background-color: #f1f1f1;">
    <div class="container-fluid">
        <div class="row mt-2" *ngIf="Entry_View" style="background-color: #f1f1f1 !important;">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-body" style="background-color: #f1f1f1 !important;">
                        <form>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="col-md-12">
                                        <label class="col-md-4 label-down-alighn-stk-ad-mstr-prhse-rte">User Role Name <span style="color:#ef071e; font-size: 22px; vertical-align: -webkit-baseline-middle;">*</span></label>
                                        <mat-form-field class="col-md-8 margin-lh-rh-to-crect-textbox" style="border: 1px solid lightgrey; height: 40px;padding-left: 10px;margin-bottom: 0;background-color: #fff;">
                                            <input matInput type="text" [(ngModel)]="User_Role_.User_Role_Name" name="User_Role_Name" class="input-text-Brand-group-diary">
                                        </mat-form-field>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="col-md-12">
                                        <button mat-raised-button type="button" [hidden]="User_Role_Save==false" id="Save_Button" class="btn btn-danger pull-right save-close-new-buttons-to-crect" (click)="Save_User_Role()">Save</button>
                                        <button mat-raised-button type="button" class="btn btn-danger pull-right save-close-new-buttons-to-crect" (click)="Close_Click()">Close</button>
                                    </div>
                                </div>
                            </div>
                            <div class="clearfix"></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="row" *ngIf="!Entry_View">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-body" style="align-items: center; border: 0; border-radius: 6px; margin-left: 2px; color: #333333; background: #fff; width: 100%;padding: 3px;background-color: #f1f1f1; box-shadow: 0 2px 2px 0 rgba(0, 0, 0, 0.14), 0 3px 1px -2px rgba(0, 0, 0, 0.2), 0 1px 5px 0 rgba(0, 0, 0, 0.12);">
                        <form>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="col-md-12 margin-crect-dte-account-group-diary" style="display: flex;align-items: center;">
                                        <label class="col-md-3 text-title-to-correct-Brand-group-diary ">User Role Name</label>
                                        <mat-form-field class="col-md-10 margin-lh-rh-to-crect-textbox" style="border: 1px solid lightgrey; height: 40px; background-color: #fff ;">
                                            <input matInput type="text" [(ngModel)]="Search_User_Role_Name" name="Search_User_Role_Name" class="col-md-8 input-text-Brand-group-diary">
                                        </mat-form-field>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <button mat-raised-button type="button" (click)="Search_User_Role()" class="ml-2 btn btn-danger button-to-crect-margin mt-0">Search</button>
                                    <button mat-raised-button type="button" (click)="Create_New()" class="btn btn-danger button-to-crect-margin mt-0">Create New</button>
                                </div>
                            </div>
                            <div class="clearfix"></div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-12">
                <div class="table-responsive card">
                    <div class="table-responsive" [style.height.px]="myInnerHeight" style="overflow-y: scroll;background-color: #f1f1f1;">
                        <table class="table table-hover">
                            <thead class="thead">
                                <th class="crect-margin-width-table-header-title">Sl No</th>
                                <th>User Role</th>
                                <!-- <th>User Type</th> -->
                                <!-- <th>Working Status</th> -->
                                <th [hidden]="User_Role_Edit==false" class="crect-margin-width-table-header-title">Edit</th>
                                <th [hidden]="User_Role_Delete==false" class="crect-margin-width-table-header-title">Delete</th>
                            </thead>
                            <ng-container *ngFor="let role of User_Role_Data; let i = index">
                                <tr>
                                    <td style="padding-left:5px;">{{ i+1 }}</td>
                                    <td>{{role.User_Role_Name}}</td>
                                    <td>
                                        <button [hidden]="User_Role_Edit==false" class="btn btn-primary btn-link btn-sm btn-just-icon mat-raised-button" mat-raised-button type="button" (click)="Edit_User_Role(role)">
                                            <i class="material-icons">edit</i>
                                        </button>
                                    </td>
                                    <td>
                                        <button [hidden]="User_Role_Delete==false" class="btn btn-danger btn-link btn-sm btn-just-icon mat-raised-button" mat-raised-button type="button" (click)="Delete_User_Role(role.User_Role_Id, i)">
                                            <i class="material-icons">close</i>
                                        </button>
                                    </td>
                                </tr>
                            </ng-container>
                        </table>
                    </div>
                </div>
                <label class="entry-num">Entries : {{Total_Entries}}</label>
            </div>
        </div>
    </div>
</div>

<!-- Loading Overlay -->
<div *ngIf="issLoading" class="ig-overlay">
  <mat-progress-spinner [color]="color" [mode]="mode" [value]="value" diameter="36"></mat-progress-spinner>
</div>

<div class="ig-page">

  <!-- ── HEADER ── -->
  <div class="ig-header">
    <div>
      <h1 class="ig-title">Departments</h1>
      <p class="ig-subtitle">Manage company departments</p>
    </div>
    <button mat-button class="ig-btn-add" type="button" (click)="Create_New()" *ngIf="!Entry_View">
      <i class="material-icons">add</i> Add Department
    </button>
  </div>

  <!-- ── ENTRY FORM ── -->
  <div class="ig-form-card" *ngIf="Entry_View">
    <p class="ig-form-label">{{ Department_.Department_Id > 0 ? 'Edit Department' : 'New Department' }}</p>
    <div class="ig-form-row">
      <div class="ig-field">
        <label class="ig-label">Department Name <span class="ig-req">*</span></label>
        <input
          type="text"
          class="ig-input"
          [(ngModel)]="Department_.Department_Name"
          name="Department_Name"
          placeholder="Enter department name"
          autocomplete="off"
        />
      </div>
      <div class="ig-form-actions">
        <button class="ig-btn-cancel" type="button" (click)="Close_Click()">Cancel</button>
        <button
          class="ig-btn-save"
          type="button"
          id="Save_Button"
          [hidden]="Department_Save == false"
          (click)="Save_Department()"
        >Save</button>
      </div>
    </div>
  </div>

  <!-- ── SEARCH ── -->
  <div class="ig-search-bar" *ngIf="!Entry_View">
    <div class="ig-search-wrap">
      <i class="material-icons">search</i>
      <input
        type="text"
        class="ig-search-input"
        [(ngModel)]="Search_Department_"
        name="Search_Department_"
        placeholder="Search departments…"
        (keyup.enter)="Search_Department()"
      />
    </div>
    <span class="ig-count">{{ Total_Entries }} {{ Total_Entries === 1 ? 'record' : 'records' }}</span>
  </div>

  <!-- ── TABLE ── -->
  <div class="ig-table-card" *ngIf="!Entry_View">
    <div class="ig-table-wrap" [style.max-height.px]="myInnerHeight">
      <table class="ig-table">
        <thead>
          <tr>
            <th class="ig-th ig-th-no">#</th>
            <th class="ig-th">Department Name</th>
            <th class="ig-th ig-th-actions">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let dept of Department_Data; let i = index" class="ig-tr">
            <td class="ig-td ig-td-no">{{ i + 1 }}</td>
            <td class="ig-td ig-td-name">{{ dept['Department_Name'] }}</td>
            <td class="ig-td ig-td-actions">
              <button class="ig-icon-btn ig-edit" [hidden]="Department_Edit == false"
                (click)="Edit_Department(dept)" title="Edit">
                <i class="material-icons">edit</i>
              </button>
              <button class="ig-icon-btn ig-delete" [hidden]="Department_Delete == false"
                (click)="Delete_Department(dept.Department_Id, i)" title="Delete">
                <i class="material-icons">delete_outline</i>
              </button>
            </td>
          </tr>
          <tr *ngIf="Department_Data?.length === 0">
            <td colspan="3" class="ig-empty">No departments found</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

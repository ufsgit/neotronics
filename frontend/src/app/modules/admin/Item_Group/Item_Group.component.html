<!-- Loading Overlay -->
<div *ngIf="issLoading" class="ig-overlay">
  <mat-progress-spinner [color]="color" [mode]="mode" [value]="value" diameter="36"></mat-progress-spinner>
</div>

<div class="ig-page">

  <!-- ── HEADER ── -->
  <div class="ig-header">
    <div>
      <h1 class="ig-title">Item Groups</h1>
      <p class="ig-subtitle">Manage product categories</p>
    </div>
    <button mat-button class="ig-btn-add" type="button" (click)="Create_New()" *ngIf="!Entry_View">
      <i class="material-icons">add</i> Add Group
    </button>
  </div>

  <!-- ── ENTRY FORM ── -->
  <div class="ig-form-card" *ngIf="Entry_View">
    <p class="ig-form-label">{{ Item_Group_.Item_Group_Id > 0 ? 'Edit Item Group' : 'New Item Group' }}</p>
    <div class="ig-form-row">
      <div class="ig-field">
        <label class="ig-label">Item Group Name <span class="ig-req">*</span></label>
        <input
          type="text"
          class="ig-input"
          [(ngModel)]="Item_Group_.Item_Group_Name"
          name="Item_Group_Name_Entry"
          placeholder="Enter item group name"
          autocomplete="off"
        />
      </div>
      <div class="ig-form-actions">
        <button class="ig-btn-cancel" type="button" (click)="Close_Click()">Cancel</button>
        <button
          class="ig-btn-save"
          type="button"
          id="Save_Button"
          [hidden]="Item_Group_Save == false"
          (click)="Save_Item_Group()"
        >Save</button>
      </div>
    </div>
  </div>

  <!-- ── SEARCH ── -->
  <div class="ig-search-bar" *ngIf="!Entry_View">
    <div class="ig-search-wrap">
      <i class="material-icons" (click)="Search_Item_Group()" style="cursor: pointer;">search</i>
      <input
        type="text"
        class="ig-search-input"
        [(ngModel)]="search_Item_Group_"
        name="search_input"
        placeholder="Search item groups…"
        (ngModelChange)="Search_Item_Group()"
      />
    </div>
    <span class="ig-count">{{ Total_Entries }} {{ Total_Entries === 1 ? 'record' : 'records' }}</span>
  </div>

  <!-- ── TABLE ── -->
  <div class="ig-table-card" *ngIf="!Entry_View">
    <div class="ig-table-wrap" [style.max-height.px]="myInnerHeight">
      <table class="ig-table">
        <thead>
          <tr>
            <th class="ig-th ig-th-no">#</th>
            <th class="ig-th">Item Group Name</th>
            <th class="ig-th ig-th-actions">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let grp of Item_Group_Data; let i = index" class="ig-tr">
            <td class="ig-td ig-td-no">{{ i + 1 }}</td>
            <td class="ig-td ig-td-name">{{ grp['Item_Group_Name'] }}</td>
            <td class="ig-td ig-td-actions">
              <button
                class="ig-icon-btn ig-edit"
                [hidden]="Item_Group_Edit == false"
                (click)="Edit_Item_Group(grp, i)"
                title="Edit"
              ><i class="material-icons">edit</i></button>
              <button
                class="ig-icon-btn ig-delete"
                [hidden]="Item_Group_Delete == false"
                (click)="Delete_Item_Group(grp.Item_Group_Id, i)"
                title="Delete"
              ><i class="material-icons">delete_outline</i></button>
            </td>
          </tr>
          <tr *ngIf="Item_Group_Data?.length === 0">
            <td colspan="3" class="ig-empty">No records found</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<div *ngIf="issLoading" class="overlay">
    <mat-progress-spinner class="spinner" [color]="color" [mode]="mode" [value]="value">
    </mat-progress-spinner>
</div>

<div class="main-trackbox-content">
    <div class="trackbox-container">

        <!-- FORM ENTRY VIEW -->
        <div class="row" *ngIf="Entry_View">
            <div class="col-md-12">
                <div class="trackbox-table-card p-4">
                    <form>
                        <div class="row">
                            <div class="col-md-6">
                                <label class="input-label mb-2 d-block" style="font-weight: 600; font-size: 13px; color: #4e5e7a;">
                                    Sale Unit Name <span style="color:#ef071e;">*</span>
                                </label>
                                <div class="modern-form-field">
                                    <input matInput type="text" [(ngModel)]="Sale_Unit_.Sale_Unit_Name" name="Sale_Unit_Name_Entry" placeholder="Enter Sale Unit Name" style="border:none; width: 100%; outline: none; font-size: 14px;">
                                </div>
                            </div>
                            <div class="col-md-6 d-flex align-items-end justify-content-end gap-3">
                                <button mat-raised-button type="button" class="btn-add-new-trackbox" style="background-color: #6c757d !important;" (click)="Close_Click()">Close</button>
                                <button mat-raised-button type="button" [hidden]="Sale_Unit_Save==false" id="Save_Button" class="btn-add-new-trackbox" (click)="Save_Sale_Unit()">Save Unit</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- LIST VIEW -->
        <div *ngIf="!Entry_View">

            <!-- SEARCH AND ACTION SECTION -->
            <div class="trackbox-filter-area">
                <div class="modern-search-wrapper">
                    <i class="material-icons">search</i>
                    <input type="text"
                           class="modern-search-input"
                           [(ngModel)]="Search_Name"
                           name="search_input"
                           placeholder="Search Sale Unit..."
                           (keyup.enter)="Search_Sale_Unit()">
                </div>

                <button mat-raised-button type="button" (click)="Create_New()" class="btn-add-new-trackbox">
                    <i class="material-icons">add</i>
                    Add Unit
                </button>
            </div>

            <!-- DATA TABLE SECTION -->
            <div class="trackbox-table-card">
                <div class="table-responsive" [style.height.px]="myInnerHeight" style="overflow-y: scroll;">
                    <table class="modern-trackbox-table">
                        <thead>
                            <tr>
                                <th class="col-no">No.</th>
                                <th>Sale Unit Name</th>
                                <th class="col-actions">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let Sale_Unit1 of Sale_Unit_Data; let i = index">
                                <td class="col-no">{{ i + 1 }}</td>
                                <td style="font-weight: 500;">{{ Sale_Unit1["Sale_Unit_Name"] }}</td>
                                <td class="col-actions">
                                    <div class="d-flex justify-content-center">
                                        <div class="action-icon-btn btn-edit-tb"
                                             [hidden]="Sale_Unit_Edit==false"
                                             (click)="Edit_Sale_Unit(Sale_Unit1, i)"
                                             title="Edit">
                                            <i class="material-icons">edit</i>
                                        </div>
                                        <div class="action-icon-btn btn-delete-tb"
                                             [hidden]="Sale_Unit_Delete==false"
                                             (click)="Delete_Sale_Unit(Sale_Unit1.Sale_Unit_Id, i)"
                                             title="Delete">
                                            <i class="material-icons">delete_outline</i>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            <tr *ngIf="Sale_Unit_Data?.length === 0">
                                <td colspan="3" class="text-center py-5 text-muted">No records found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="entries-summary">
                Entries : {{Total_Entries}}
            </div>
        </div>

    </div>
</div>

            <mat-form-field class="col-md-9 mat-form-field-custom">
                <input matInput type="text" maxlength="50" [(ngModel)]="User_Details_.User_Details_Name" name="User_Details_.User_Details_Name">
            </mat-form-field>  
        </div>

        <div class="col-md-12 form-row-custom">
            <label class="col-md-3 label-custom">Password <span class="required-star">*</span> </label>
            <mat-form-field class="col-md-9 mat-form-field-custom">
                <input matInput type="text" maxlength="50" [(ngModel)]="User_Details_.Password" name="User_Details_.Password">
            </mat-form-field>
        </div>

        <div class="col-md-12 form-row-custom">
            <label class="col-md-3 label-custom">Email ID </label>

                <input matInput type="email" maxlength="250" [(ngModel)]="User_Details_.Email" name="User_Details_.Email">
            </mat-form-field>
        </div>

        <div class="col-md-12 form-row-custom">
            <label class="col-md-3 label-custom">Mobile Number </label>
            <mat-form-field class="col-md-9 mat-form-field-custom">
                <input matInput type="text" maxlength="250" [(ngModel)]="User_Details_.Mobile" name="User_Details_.Mobile">
            </mat-form-field>
        </div>

        <div class="col-md-12 form-row-custom">
            <label class="col-md-3 label-custom">User Type <span class="required-star">*</span> </label>
            <mat-form-field class="col-md-9 mat-form-field-custom">
                <select matNativeControl [(ngModel)]="User_Type_" name="User_Type_" required>
                    <option [ngValue]="null">Select Type</option>
                    <option *ngFor="let User_Type_T of User_Type_Data" [ngValue]="User_Type_T">{{User_Type_T.User_Type_Name}}</option>
                </select>
            </mat-form-field>
        </div>

        <div class="col-md-12 form-row-custom">
            <label class="col-md-3 label-custom">Working Status <span class="required-star">*</span> </label>
            <mat-form-field class="col-md-9 mat-form-field-custom">
                <select matNativeControl [(ngModel)]="Working_Status_" name="Working_Status_" required>
                    <option [ngValue]="null">Select Status</option>
                    <option *ngFor="let Working_Status_T of Working_Status_Data" [ngValue]="Working_Status_T">{{Working_Status_T.Working_Status_Name}}</option>
                </select>
            </mat-form-field>
        </div>

        <div class="col-md-12 form-row-custom">
            <label class="col-md-3 label-custom">User Role <span class="required-star">*</span> </label>
            <mat-form-field class="col-md-9 mat-form-field-custom">
                <select matNativeControl [(ngModel)]="User_Role_" name="User_Role_" required>
                    <option [ngValue]="null">Select Role</option>
                    <option *ngFor="let User_Role_T of User_Role_Data" [ngValue]="User_Role_T">{{User_Role_T.User_Role_Name}}</option>
                </select>
            </mat-form-field>
        </div>

        <div class="col-md-12 form-row-custom">
            <label class="col-md-3 label-custom">Department <span class="required-star">*</span> </label>
            <mat-form-field class="col-md-9 mat-form-field-custom">
                <select matNativeControl [(ngModel)]="Department_" name="Department_" required>
                    <option [ngValue]="null">Select Department</option>
                    <option *ngFor="let Department_T of Department_Data" [ngValue]="Department_T">{{Department_T.Department_Name}}</option>
                </select>
            </mat-form-field>
        </div>


<div *ngIf="issLoading" class="overlay">
<mat-progress-spinner class="spinner" [color]="color" [mode]="mode" [value]="value">
</mat-progress-spinner>
</div>
<div class="main-content">
<div class="container-fluid">
<div class="row" *ngIf="!Entry_View">
        <div class="col-md-12">
                <div class="card">
              
                <div class="card-body">
                <form>
                <div class="row">
                <div class="col-md-12 padd-lft-crect-alighn-wole-div">

                        <div class="col-md-1 chck-bx-down-alighn-prhse-mstr-srch-sctn"> 
                                <label class="date-label-crect-search-sales-section label-to-crect-all-names-to-div-tre-prt-sles">Date</label>
                                    <div _ngcontent-xmy-c9="" class="checkbox-to-crect-sales-search-section dv-crct-up-wrd-prchse-mstr-chck-bx-srch-sctn">
                                        <div _ngcontent-xmy-c9="" class="form-check">
                                            <label _ngcontent-xmy-c9="" class="form-check-label">
                                                <input type='checkbox' class="form-check-input" placeholder='Update Stock'  [(ngModel)]="Look_In_Date" name="Look_In_Date"/>
                                                <span _ngcontent-xmy-c9="" class="form-check-sign"><span _ngcontent-xmy-c9="" class="check"></span>
                                                </span>
                                            </label>
                                        </div>
                                    </div>   
                                </div>  

                    <div class="col-md-3 croct-float-purchase-master-section padd-lft-crect-alighn-wole-div">
                        <label class="col-md-4 label-down-alighn-stk-ad-mstr-prhse-rte label-mrgn-pdng-crect-stk-mstr-frm">From</label>
                        <mat-form-field class="col-md-8 spcing-crect-input-bxes-wole-divs">
                                <input matInput [matDatepicker]="dp1" placeholder="" name="Search_FromDate"[(ngModel)]="Search_FromDate">
                                <mat-datepicker-toggle matSuffix [for]="dp1"></mat-datepicker-toggle>
                                <mat-datepicker #dp1></mat-datepicker>
                              </mat-form-field>
                        </div>
    
                            <div class="col-md-3 croct-float-purchase-master-section">
                                <label class="col-md-4 label-down-alighn-stk-ad-mstr-prhse-rte">TO</label>
                                <mat-form-field class="col-md-8 spcing-crect-input-bxes-wole-divs">
                                        <input matInput [matDatepicker]="dp2"  name="Search_ToDate" placeholder="" [(ngModel)]="Search_ToDate">
                                        <mat-datepicker-toggle matSuffix [for]="dp2"></mat-datepicker-toggle>
                                        <mat-datepicker #dp2></mat-datepicker>
                                      </mat-form-field>
                                </div>
                                    
           <div class="col-md-3 tab-wole-div-alyn alighn-right-inputs-sales-grid">
                <label class="col-md-4 label-to-crect-all-names-to-divs mrgin-alghn-label-text-otrs-nxt">Item Name <span style="color:#ef071e; font-size: 22px; vertical-align: -webkit-baseline-middle;">*</span></label>
                <input type="text" [matAutocomplete]="auto1" [(ngModel)]="Stock_" id ="item" name="item" 
                (click)="Search_Item_Typeahead($event)" (input)="Search_Item_Typeahead($event)"   
                 class="col-md-8 for-input-selct-tblelst mrgn-crct-input-bx-sls-mstr-rspnsv-nw-sctn" />
                <mat-autocomplete #auto1="matAutocomplete" [displayWith]="display_Item">
                    <mat-option *ngIf="isLoading"><mat-spinner diameter="500"></mat-spinner></mat-option>
                    <ng-container *ngIf="!isLoading">
                        <mat-option *ngFor="let Item of Stock_Data" [value]="Item" >
                            <span>{{Item.ItemName}}</span>
                        </mat-option>
                    </ng-container>
                </mat-autocomplete>
                </div>
                                <div class="col-md-2  croct-float-purchase-master-section">
                                     <button mat-raised-button type="submit" (click)="Search_Damage_Report()" class="btn btn-danger button-to-crect-margin pull-right change-colour-button"><i class="fa fa-search" aria-hidden="true"></i></button>        
                                </div>           
                </div>
             
            
                </div>
                <div class="clearfix"></div>
                </form>
                </div>
                </div>
                </div>   
<div class="col-md-12">
<div class="card card-plain" >
<div class="card-body">
<div class="table-responsive">
 <cdk-virtual-scroll-viewport [style.height.px]="myInnerHeight" itemSize="90" >
      
    <table class="table table-hover">
        <thead class="thead">
        <th>Date</th>
        <th>Item</th>
        <th>Quantity</th>
        <th>Rate</th>
        <th>Amount</th>
        </thead>
    <ng-container *cdkVirtualFor="let Damage_Master1 of Damage_Master_Data; let i = index">
       <tr>
        <td>{{Damage_Master1["Search_Date"]}}</td>
        <td>{{Damage_Master1["ItemName"]}}</td>
        <td>{{Damage_Master1["Quantity"]}}</td>
        <td>{{Damage_Master1["SaleRate"]}}</td>
        <td>{{Damage_Master1["Amount"]}}</td>
      </tr>
 </ng-container>
</table>
</cdk-virtual-scroll-viewport>
</div>
</div>
<label class="entry-num">Entries : {{Total_Entries}}</label>
</div>
</div>
</div>
</div>
</div>
